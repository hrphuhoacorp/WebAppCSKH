name: Deploy .NET API to VPS Docker

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  CONTAINER_NAME: my-backend-api
  PORT_HOST: 10000
  PORT_CONTAINER: 10000
  MEDIA_PATH: /data/phf-media  # Thêm biến môi trường cho media path

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./be
          file: ./be/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build-and-push

    steps:
      # BƯỚC QUAN TRỌNG: Chuyển tên Repo thành chữ thường (lowercase) ở tầng deploy
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy trực tiếp trên máy local
        run: |
          # 1. Đăng nhập vào GitHub Container Registry tại local
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

          # 2. Di chuyển vào thư mục code và cập nhật source code mới nhất
          cd /opt/phf-crm/source/WebAppCSKH
          git pull origin main

          # 3. Di chuyển ra thư mục chứa docker-compose và pull đúng bản image chữ thường
          cd /opt/phf-crm
          
          # Dùng biến IMAGE_NAME viết thường để pull tránh lỗi uppercase của Docker
          docker pull ghcr.io/${{ env.IMAGE_NAME }}:latest || true
          docker compose up -d --build api

          # 4. Dọn dẹp các ảnh docker cũ bị thừa để tránh đầy ổ cứng
          docker image prune -f
          docker ps