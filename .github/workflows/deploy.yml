name: Deploy .NET API to VPS Docker

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  CONTAINER_NAME: my-backend-api
  PORT_HOST: 10000
  PORT_CONTAINER: 10000
  MEDIA_PATH: /data/phf-media  # Thêm biến môi trường cho media path

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./be
          file: ./be/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Set lowercase image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 1. Backup media files từ container cũ (trước khi xóa)
            echo "Backing up media files..."
            docker cp ${{ env.CONTAINER_NAME }}:/data/phf-media /tmp/phf-media-backup 2>/dev/null || echo "No old container or media folder"

            # 2. Xóa container cũ
            echo "Removing old container..."
            docker rm -f ${{ env.CONTAINER_NAME }} || true

            # 3. Tạo thư mục media trên host nếu chưa có
            mkdir -p ${{ env.MEDIA_PATH }}

            # 4. Restore backup vào thư mục host
            if [ -d "/tmp/phf-media-backup" ]; then
              echo "Restoring media files..."
              cp -r /tmp/phf-media-backup/* ${{ env.MEDIA_PATH }}/ 2>/dev/null || true
              rm -rf /tmp/phf-media-backup
            fi

            # 5. Pull image mới
            echo "Pulling new image..."
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # 6. Chạy container mới VỚI VOLUME MOUNT
            echo "Starting new container..."
            docker run -d \
              --name ${{ env.CONTAINER_NAME }} \
              -p ${{ env.PORT_HOST }}:${{ env.PORT_CONTAINER }} \
              -v ${{ env.MEDIA_PATH }}:/data/phf-media \
              -e ASPNETCORE_URLS=http://+:${{ env.PORT_CONTAINER }} \
              --restart always \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            # 7. Cleanup
            docker image prune -f

            # 8. Verify
            echo "Container started successfully!"
            docker ps | grep ${{ env.CONTAINER_NAME }}
            echo "Media files on host:"
            ls -la ${{ env.MEDIA_PATH }}/ 2>/dev/null || echo "Media folder empty"